name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # Fast regression gate: compile every module, run the golden-file
  # diff, and emit Dart. Doesn't require a Flutter install — Dart alone
  # is enough because `sartEmit` only shells out to `dart format` (which
  # degrades gracefully when dart isn't on PATH).
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: coursier/cache-action@v6
      - uses: sbt/setup-sbt@v1
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: sbt -Dsbt.color=false sartGoldenVerify

  # Per-platform build matrix. Each job is the full chain
  #   compile → emit → scaffold → flutter build
  # to prove the Dart output still lands cross-platform.
  platforms:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            task: sartLinux
          - os: ubuntu-latest
            task: sartWeb
          - os: ubuntu-latest
            task: sartAndroid
          - os: macos-latest
            task: sartMacOS
          - os: macos-latest
            task: sartIOS
          - os: windows-latest
            task: sartWindows
    runs-on: ${{ matrix.os }}
    needs: regression
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: coursier/cache-action@v6
      - uses: sbt/setup-sbt@v1
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      # `flutter build linux` shells out to CMake, which pkg_check_modules
      # for gtk-3.0/glib/pango. The hosted ubuntu runner doesn't ship
      # those by default. Cheap to install; skipped on non-Linux jobs.
      - if: matrix.task == 'sartLinux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev liblzma-dev libstdc++-12-dev
      # Quote the JVM property so the Windows shell doesn't split on `=`
      # and feed `false` to sbt as a separate command argument.
      - run: sbt "-Dsbt.color=false" ${{ matrix.task }}

  # Plugin consumer smoke test: publish locally, stand up a minimal
  # consumer project, run sartEmit through it, and analyze. This is
  # the end-to-end "external user" check.
  plugin-consumer:
    runs-on: ubuntu-latest
    needs: regression
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: coursier/cache-action@v6
      - uses: sbt/setup-sbt@v1
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: sbt -Dsbt.color=false sartPublishLocalAll
      - run: .github/scripts/plugin-consumer-smoke.sh
